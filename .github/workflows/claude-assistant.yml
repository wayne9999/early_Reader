name: Claude Assistant

# Agent workflow 1a — interactive repo assistant.
# Mention @claude in any issue or PR comment and Claude Code runs inside
# Actions with the repo checked out: it can answer questions, implement
# fixes on a branch, and push commits to the PR.
#
# Requires one repo secret: ANTHROPIC_API_KEY
# (console.anthropic.com → API keys). Pro/Max subscribers can instead run
# `claude setup-token` locally and save it as CLAUDE_CODE_OAUTH_TOKEN, then
# swap the input below to claude_code_oauth_token.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
