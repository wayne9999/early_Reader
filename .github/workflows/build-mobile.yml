name: Build Mobile (Capacitor)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to build
        required: true
        default: both
        type: choice
        options:
          - android
          - ios
          - both
      release_channel:
        description: Distribution channel
        required: true
        default: internal
        type: choice
        options:
          - internal
          - testflight
          - app-distribution

permissions:
  contents: read

concurrency:
  group: build-mobile-${{ github.ref_name }}-${{ github.event.inputs.platform || 'both' }}
  cancel-in-progress: true

env:
  MOBILE_PLATFORM: ${{ github.event.inputs.platform || 'both' }}
  MOBILE_RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'internal' }}

jobs:
  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    outputs:
      web-artifact: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build web app for native shell
        env:
          VITE_APP_ENVIRONMENT: production
          VITE_STRIPE_MODE: live
          VITE_FIREBASE_API_KEY: ${{ vars.PROD_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.PROD_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.PROD_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.PROD_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.PROD_VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_SITE_KEY: ${{ vars.PROD_VITE_FIREBASE_APP_CHECK_SITE_KEY }}
          VITE_STRIPE_DONATION_LINK: ${{ vars.PROD_VITE_STRIPE_DONATION_LINK }}
          VITE_STRIPE_FAMILY_PLUS_LINK: ${{ vars.PROD_VITE_STRIPE_FAMILY_PLUS_LINK }}
          VITE_STRIPE_TEACHER_PRO_LINK: ${{ vars.PROD_VITE_STRIPE_TEACHER_PRO_LINK }}
          VITE_STRIPE_CUSTOMER_PORTAL_LINK: ${{ vars.PROD_VITE_STRIPE_CUSTOMER_PORTAL_LINK }}
        run: npm run build
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 7

  build-android:
    name: Build Android
    if: ${{ (github.event.inputs.platform || 'both') == 'android' || (github.event.inputs.platform || 'both') == 'both' }}
    needs: build-web
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FIREBASE_APP_DISTRIBUTION_TOKEN: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TOKEN }}
      READNEST_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.READNEST_FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_ANDROID_APP_ID: ${{ vars.FIREBASE_ANDROID_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Ensure Capacitor Android project exists
        run: test -d android || npx cap add android
      - name: Restore signed keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
      - name: Sync Capacitor Android project
        run: npx cap sync android
      - name: Build signed release AAB
        if: env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
      - name: Build unsigned debug APK
        if: env.ANDROID_KEYSTORE_BASE64 == '' || env.ANDROID_KEYSTORE_PASSWORD == '' || env.ANDROID_KEY_ALIAS == '' || env.ANDROID_KEY_PASSWORD == ''
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload to Firebase App Distribution
        if: env.MOBILE_RELEASE_CHANNEL == 'app-distribution' && env.READNEST_FIREBASE_SERVICE_ACCOUNT != '' && env.FIREBASE_ANDROID_APP_ID != '' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ env.READNEST_FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: android/app/build/outputs/bundle/release/app-release.aab
      - uses: actions/upload-artifact@v4
        with:
          name: readnest-android
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS
    if: ${{ (github.event.inputs.platform || 'both') == 'ios' || (github.event.inputs.platform || 'both') == 'both' }}
    needs: build-web
    runs-on: macos-14
    env:
      IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_APP_STORE_PROVISION_BASE64: ${{ secrets.IOS_APP_STORE_PROVISION_BASE64 }}
      IOS_EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
      APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
      APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Ensure Capacitor iOS project exists
        run: test -d ios || npx cap add ios
      - name: Sync Capacitor iOS project
        run: npx cap sync ios
      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update
      - name: Import code-signing certificate
        if: env.IOS_DIST_CERT_P12_BASE64 != '' && env.IOS_DIST_CERT_PASSWORD != ''
        run: |
          echo "$IOS_DIST_CERT_P12_BASE64" | base64 -d > /tmp/dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      - name: Install provisioning profile
        if: env.IOS_APP_STORE_PROVISION_BASE64 != ''
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_APP_STORE_PROVISION_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/ReadNest.mobileprovision
      - name: Build simulator app
        if: env.IOS_DIST_CERT_P12_BASE64 == '' || env.IOS_APP_STORE_PROVISION_BASE64 == ''
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath $PWD/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Archive signed app
        if: env.IOS_DIST_CERT_P12_BASE64 != '' && env.IOS_APP_STORE_PROVISION_BASE64 != '' && env.IOS_EXPORT_OPTIONS_PLIST != ''
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive
      - name: Export IPA
        if: env.IOS_DIST_CERT_P12_BASE64 != '' && env.IOS_APP_STORE_PROVISION_BASE64 != '' && env.IOS_EXPORT_OPTIONS_PLIST != ''
        working-directory: ios/App
        run: |
          echo "$IOS_EXPORT_OPTIONS_PLIST" > /tmp/export-options.plist
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist /tmp/export-options.plist
      - name: Upload to TestFlight
        if: env.MOBILE_RELEASE_CHANNEL == 'testflight' && env.APPSTORE_CONNECT_API_KEY != '' && env.APPSTORE_CONNECT_KEY_ID != '' && env.APPSTORE_CONNECT_ISSUER_ID != ''
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app -f ios/App/build/App.ipa \
            --type ios \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"
      - uses: actions/upload-artifact@v4
        with:
          name: readnest-ios
          path: |
            ios/App/build/App.ipa
            ios/App/build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: warn
