name: Deploy ReadNest Production

on:
  push:
    branches: ["production"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: readnest-production
  cancel-in-progress: false

jobs:
  build:
    name: Build immutable production artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4

      - name: Verify production ref
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != "production" ]]; then
            echo "Production deployments must use the production branch."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Validate learning content
        run: npm run validate:content

      - name: Run unit and integration tests
        run: npm run test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Build production web app
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_APP_CHECK_SITE_KEY: ${{ vars.VITE_FIREBASE_APP_CHECK_SITE_KEY }}
          VITE_STRIPE_DONATION_LINK: ${{ vars.VITE_STRIPE_DONATION_LINK }}
          VITE_STRIPE_FAMILY_PLUS_LINK: ${{ vars.VITE_STRIPE_FAMILY_PLUS_LINK }}
          VITE_STRIPE_TEACHER_PRO_LINK: ${{ vars.VITE_STRIPE_TEACHER_PRO_LINK }}
          VITE_STRIPE_CUSTOMER_PORTAL_LINK: ${{ vars.VITE_STRIPE_CUSTOMER_PORTAL_LINK }}
          VITE_SUPPORT_EMAIL: ${{ vars.VITE_SUPPORT_EMAIL }}

      - name: Upload immutable production artifact
        uses: actions/upload-artifact@v4
        with:
          name: readnest-production-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy approved artifact to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://myreadnest.org/
    steps:
      - name: Checkout production configuration
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.READNEST_FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Download approved production artifact
        uses: actions/download-artifact@v4
        with:
          name: readnest-production-${{ github.sha }}
          path: dist

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project readnest-f9c67 --non-interactive

      - name: Add deployment summary
        run: |
          {
            echo "## ReadNest production deployment"
            echo ""
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Branch: \`$GITHUB_REF_NAME\`"
            echo "- URL: https://myreadnest.org/"
            echo "- Firebase fallback: https://readnest-f9c67.web.app/"
          } >> "$GITHUB_STEP_SUMMARY"

