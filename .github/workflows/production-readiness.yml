name: Validate Production Promotion

on:
  pull_request:
    branches: ["production"]

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  production-readiness:
    name: Production readiness
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://myreadnest.org/
    steps:
      - name: Checkout proposed production commit
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Typecheck app
        run: npm run check

      - name: Validate learning content
        run: npm run validate:content

      - name: Run unit and integration tests
        run: npm run test

      - name: Check app dependencies
        run: npm audit --audit-level=moderate

      - name: Typecheck functions
        working-directory: functions
        run: npm run check

      - name: Check functions dependencies
        working-directory: functions
        run: npm audit --audit-level=moderate

      - name: Build production web app
        run: npm run validate:deployment-env && npm run build
        env:
          VITE_BASE_PATH: /
          VITE_APP_ENVIRONMENT: production
          VITE_STRIPE_MODE: live
          VITE_EXPECTED_FIREBASE_PROJECT_ID: readnest-f9c67
          VITE_FORBIDDEN_FIREBASE_PROJECT_ID: readnest-dev-f9c67
          VITE_FIREBASE_API_KEY: ${{ vars.PROD_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.PROD_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.PROD_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.PROD_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.PROD_VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.PROD_VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_APP_CHECK_SITE_KEY: ${{ vars.PROD_VITE_FIREBASE_APP_CHECK_SITE_KEY }}
          VITE_STRIPE_DONATION_LINK: ${{ vars.PROD_VITE_STRIPE_DONATION_LINK }}
          VITE_STRIPE_FAMILY_PLUS_LINK: ${{ vars.PROD_VITE_STRIPE_FAMILY_PLUS_LINK }}
          VITE_STRIPE_TEACHER_PRO_LINK: ${{ vars.PROD_VITE_STRIPE_TEACHER_PRO_LINK }}
          VITE_STRIPE_CUSTOMER_PORTAL_LINK: ${{ vars.PROD_VITE_STRIPE_CUSTOMER_PORTAL_LINK }}
          VITE_SUPPORT_EMAIL: ${{ vars.VITE_SUPPORT_EMAIL }}

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run browser automation
        run: npm run test:e2e
