name: Deploy Firebase Backend

on:
  workflow_dispatch:
    inputs:
      target:
        description: Firebase backend target to deploy
        required: true
        default: rules
        type: choice
        options:
          - rules
          - functions
          - all
      include_scheduler:
        description: Include the scheduled AI insight function. Requires cloudscheduler.jobs.update permission.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: firebase-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: readnest-f9c67
      READNEST_APP_BASE_URL: ${{ vars.READNEST_APP_BASE_URL }}
      STRIPE_FAMILY_PLUS_PRICE_ID: ${{ vars.STRIPE_FAMILY_PLUS_PRICE_ID }}
      STRIPE_TEACHER_PRO_PRICE_ID: ${{ vars.STRIPE_TEACHER_PRO_PRICE_ID }}
      READNEST_AI_MODEL: ${{ vars.READNEST_AI_MODEL }}
      READNEST_AI_WARNING_LIMIT_USD: ${{ vars.READNEST_AI_WARNING_LIMIT_USD }}
      READNEST_AI_MONTHLY_LIMIT_USD: ${{ vars.READNEST_AI_MONTHLY_LIMIT_USD }}
      READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD: ${{ vars.READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD }}
      READNEST_AI_INPUT_COST_PER_1M_USD: ${{ vars.READNEST_AI_INPUT_COST_PER_1M_USD }}
      READNEST_AI_OUTPUT_COST_PER_1M_USD: ${{ vars.READNEST_AI_OUTPUT_COST_PER_1M_USD }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.READNEST_FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: npm ci

      - name: Typecheck functions
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: npm run check

      - name: Build functions
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: npm run build

      - name: Write functions runtime env
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: |
          {
            echo "STRIPE_FAMILY_PLUS_PRICE_ID=${STRIPE_FAMILY_PLUS_PRICE_ID}"
            echo "STRIPE_TEACHER_PRO_PRICE_ID=${STRIPE_TEACHER_PRO_PRICE_ID}"
            echo "READNEST_APP_BASE_URL=${READNEST_APP_BASE_URL}"
            echo "READNEST_AI_MODEL=${READNEST_AI_MODEL:-gpt-5.5}"
            echo "READNEST_AI_WARNING_LIMIT_USD=${READNEST_AI_WARNING_LIMIT_USD:-10}"
            echo "READNEST_AI_MONTHLY_LIMIT_USD=${READNEST_AI_MONTHLY_LIMIT_USD:-15}"
            echo "READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD=${READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD:-0.05}"
            echo "READNEST_AI_INPUT_COST_PER_1M_USD=${READNEST_AI_INPUT_COST_PER_1M_USD:-0}"
            echo "READNEST_AI_OUTPUT_COST_PER_1M_USD=${READNEST_AI_OUTPUT_COST_PER_1M_USD:-0}"
          } > .env

      - name: Sync Stripe secret
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && env.STRIPE_SECRET_KEY != '' }}
        run: printf '%s' "$STRIPE_SECRET_KEY" | firebase functions:secrets:set STRIPE_SECRET_KEY --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Sync Stripe webhook secret
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && env.STRIPE_WEBHOOK_SECRET != '' }}
        run: printf '%s' "$STRIPE_WEBHOOK_SECRET" | firebase functions:secrets:set STRIPE_WEBHOOK_SECRET --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Sync OpenAI secret
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && env.OPENAI_API_KEY != '' }}
        run: printf '%s' "$OPENAI_API_KEY" | firebase functions:secrets:set OPENAI_API_KEY --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Deploy Firestore rules and indexes
        if: ${{ inputs.target == 'rules' || inputs.target == 'all' }}
        run: firebase deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Deploy Functions
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && !inputs.include_scheduler }}
        run: >
          firebase deploy
          --only functions:stripeWebhook,functions:createBillingPortalSession,functions:createCheckoutSession,functions:claimPlacementStudent,functions:createLearningRecommendation,functions:requestStudentInsight,functions:processAiAnalysisJob
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force

      - name: Deploy Functions with scheduler
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && inputs.include_scheduler }}
        run: >
          firebase deploy
          --only functions:stripeWebhook,functions:createBillingPortalSession,functions:createCheckoutSession,functions:claimPlacementStudent,functions:createLearningRecommendation,functions:requestStudentInsight,functions:processAiAnalysisJob,functions:enqueueDailyInsightJobs
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force
