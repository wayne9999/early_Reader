name: Deploy Firebase Backend

on:
  workflow_dispatch:
    inputs:
      target:
        description: Firebase backend target to deploy
        required: true
        default: rules
        type: choice
        options:
          - rules
          - functions
          - hosting
          - all
      include_scheduler:
        description: Include the scheduled AI insight function. Requires cloudscheduler.jobs.update permission.
        required: true
        default: false
        type: boolean
      sync_secrets:
        description: Rewrite Firebase Function secrets before deploy. Leave off for normal deployments.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: firebase-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: readnest-f9c67
      READNEST_APP_BASE_URL: ${{ vars.READNEST_APP_BASE_URL }}
      STRIPE_FAMILY_PLUS_PRICE_ID: ${{ vars.STRIPE_FAMILY_PLUS_PRICE_ID }}
      STRIPE_TEACHER_PRO_PRICE_ID: ${{ vars.STRIPE_TEACHER_PRO_PRICE_ID }}
      READNEST_AI_MODEL: ${{ vars.READNEST_AI_MODEL }}
      READNEST_AI_WARNING_LIMIT_USD: ${{ vars.READNEST_AI_WARNING_LIMIT_USD }}
      READNEST_AI_MONTHLY_LIMIT_USD: ${{ vars.READNEST_AI_MONTHLY_LIMIT_USD }}
      READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD: ${{ vars.READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD }}
      READNEST_AI_INPUT_COST_PER_1M_USD: ${{ vars.READNEST_AI_INPUT_COST_PER_1M_USD }}
      READNEST_AI_OUTPUT_COST_PER_1M_USD: ${{ vars.READNEST_AI_OUTPUT_COST_PER_1M_USD }}
      READNEST_ENFORCE_APP_CHECK: ${{ vars.READNEST_ENFORCE_APP_CHECK }}
      SUPPORT_NOTIFICATION_EMAIL: ${{ vars.SUPPORT_NOTIFICATION_EMAIL }}
      SUPPORT_FROM_EMAIL: ${{ vars.SUPPORT_FROM_EMAIL }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_APP_CHECK_SITE_KEY: ${{ vars.VITE_FIREBASE_APP_CHECK_SITE_KEY }}
      VITE_STRIPE_DONATION_LINK: ${{ vars.VITE_STRIPE_DONATION_LINK }}
      VITE_STRIPE_FAMILY_PLUS_LINK: ${{ vars.VITE_STRIPE_FAMILY_PLUS_LINK }}
      VITE_STRIPE_TEACHER_PRO_LINK: ${{ vars.VITE_STRIPE_TEACHER_PRO_LINK }}
      VITE_STRIPE_CUSTOMER_PORTAL_LINK: ${{ vars.VITE_STRIPE_CUSTOMER_PORTAL_LINK }}
      VITE_SUPPORT_EMAIL: ${{ vars.VITE_SUPPORT_EMAIL }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.READNEST_FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        if: ${{ inputs.target == 'functions' || inputs.target == 'rules' || inputs.target == 'all' }}
        working-directory: functions
        run: npm ci

      - name: Typecheck functions
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: npm run check

      - name: Build functions
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: npm run build

      - name: Build production web app
        if: ${{ inputs.target == 'hosting' || inputs.target == 'all' }}
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Write functions runtime env
        if: ${{ inputs.target == 'functions' || inputs.target == 'all' }}
        working-directory: functions
        run: |
          {
            echo "STRIPE_FAMILY_PLUS_PRICE_ID=${STRIPE_FAMILY_PLUS_PRICE_ID}"
            echo "STRIPE_TEACHER_PRO_PRICE_ID=${STRIPE_TEACHER_PRO_PRICE_ID}"
            echo "READNEST_APP_BASE_URL=${READNEST_APP_BASE_URL}"
            echo "READNEST_AI_MODEL=${READNEST_AI_MODEL:-gpt-5.5}"
            echo "READNEST_AI_WARNING_LIMIT_USD=${READNEST_AI_WARNING_LIMIT_USD:-10}"
            echo "READNEST_AI_MONTHLY_LIMIT_USD=${READNEST_AI_MONTHLY_LIMIT_USD:-15}"
            echo "READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD=${READNEST_AI_ESTIMATED_COST_PER_INSIGHT_USD:-0.05}"
            echo "READNEST_AI_INPUT_COST_PER_1M_USD=${READNEST_AI_INPUT_COST_PER_1M_USD:-0}"
            echo "READNEST_AI_OUTPUT_COST_PER_1M_USD=${READNEST_AI_OUTPUT_COST_PER_1M_USD:-0}"
            echo "READNEST_ENFORCE_APP_CHECK=${READNEST_ENFORCE_APP_CHECK:-false}"
            echo "SUPPORT_NOTIFICATION_EMAIL=${SUPPORT_NOTIFICATION_EMAIL:-support@myreadnest.org}"
            echo "SUPPORT_FROM_EMAIL=${SUPPORT_FROM_EMAIL:-ReadNest Support <support@myreadnest.org>}"
          } > .env

      - name: Sync Stripe secret
        if: ${{ inputs.sync_secrets && (inputs.target == 'functions' || inputs.target == 'all') && env.STRIPE_SECRET_KEY != '' }}
        run: printf '%s' "$STRIPE_SECRET_KEY" | firebase functions:secrets:set STRIPE_SECRET_KEY --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Sync Stripe webhook secret
        if: ${{ inputs.sync_secrets && (inputs.target == 'functions' || inputs.target == 'all') && env.STRIPE_WEBHOOK_SECRET != '' }}
        run: printf '%s' "$STRIPE_WEBHOOK_SECRET" | firebase functions:secrets:set STRIPE_WEBHOOK_SECRET --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Sync OpenAI secret
        if: ${{ inputs.sync_secrets && (inputs.target == 'functions' || inputs.target == 'all') && env.OPENAI_API_KEY != '' }}
        run: printf '%s' "$OPENAI_API_KEY" | firebase functions:secrets:set OPENAI_API_KEY --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Sync Resend secret
        if: ${{ inputs.sync_secrets && (inputs.target == 'functions' || inputs.target == 'all') && env.RESEND_API_KEY != '' }}
        run: printf '%s' "$RESEND_API_KEY" | firebase functions:secrets:set RESEND_API_KEY --project "$FIREBASE_PROJECT_ID" --data-file - --non-interactive

      - name: Deploy Firestore rules
        if: ${{ inputs.target == 'rules' || inputs.target == 'all' }}
        run: node functions/scripts/deploy-firestore-rules.mjs

      - name: Deploy Functions
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && !inputs.include_scheduler }}
        run: >
          firebase deploy
          --only functions:stripeWebhook,functions:createBillingPortalSession,functions:createCheckoutSession,functions:claimPlacementStudent,functions:updateTeacherAssignmentStatus,functions:createLearningRecommendation,functions:requestStudentInsight,functions:submitSupportCase,functions:updateLearningCoachState,functions:processAiAnalysisJob,functions:processSupportCase
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force

      - name: Deploy Functions with scheduler
        if: ${{ (inputs.target == 'functions' || inputs.target == 'all') && inputs.include_scheduler }}
        run: >
          firebase deploy
          --only functions:stripeWebhook,functions:createBillingPortalSession,functions:createCheckoutSession,functions:claimPlacementStudent,functions:updateTeacherAssignmentStatus,functions:createLearningRecommendation,functions:requestStudentInsight,functions:submitSupportCase,functions:updateLearningCoachState,functions:processAiAnalysisJob,functions:processSupportCase,functions:enqueueDailyInsightJobs
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force

      - name: Deploy Firebase Hosting
        if: ${{ inputs.target == 'hosting' || inputs.target == 'all' }}
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
