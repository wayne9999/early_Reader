<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f80ed" />
    <meta name="application-name" content="ReadNest" />
    <meta name="apple-mobile-web-app-title" content="ReadNest" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%brand/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%brand/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%brand/apple-touch-icon.png" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta
      name="description"
      content="ReadNest gives kindergarten through grade 2 learners personalized reading practice paths with free starter games, parent progress summaries, and Teacher Pro classroom insights."
    />
    <link rel="canonical" href="https://myreadnest.org/" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />

    <!-- Save 100-300ms of LCP by opening TCP/TLS to services we always call. -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="preload" as="image" href="%BASE_URL%brand/readnest-bird-book-768.jpg" fetchpriority="high" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ReadNest" />
    <meta property="og:title" content="ReadNest | Personalized Reading Paths for Kids" />
    <meta
      property="og:description"
      content="Help early readers practice with short activities that adapt around grade, goals, missed words, parent progress summaries, and teacher insight."
    />
    <meta property="og:url" content="https://myreadnest.org/" />
    <meta property="og:image" content="https://myreadnest.org/brand/readnest-bird-book.png" />
    <meta property="og:image:alt" content="ReadNest bird mascot sitting on an open book." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReadNest | Personalized Reading Practice for Kids" />
    <meta
      name="twitter:description"
      content="Free starter activities, Family Plus personalized practice, and Teacher Pro classroom insights for early readers."
    />
    <meta name="twitter:image" content="https://myreadnest.org/brand/readnest-bird-book.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ReadNest",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "description": "ReadNest helps early elementary children build reading confidence through personalized practice paths while giving caregivers and teachers useful progress insights.",
        "audience": [
          {
            "@type": "EducationalAudience",
            "educationalRole": "student"
          },
          {
            "@type": "EducationalAudience",
            "educationalRole": "teacher"
          },
          {
            "@type": "EducationalAudience",
            "educationalRole": "parent"
          }
        ],
        "educationalLevel": ["Kindergarten", "Grade 1", "Grade 2"],
        "learningResourceType": ["Practice", "Game", "Assessment"],
        "teaches": [
          "sight word recognition",
          "phonics blending",
          "reading fluency",
          "sentence reading",
          "working memory",
          "early literacy"
        ],
        "url": "https://myreadnest.org/",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free Reader",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Family Plus",
            "price": "7",
            "priceCurrency": "USD",
            "priceSpecification": {
              "@type": "UnitPriceSpecification",
              "billingDuration": "P1M"
            }
          },
          {
            "@type": "Offer",
            "name": "Teacher Pro",
            "price": "19",
            "priceCurrency": "USD",
            "priceSpecification": {
              "@type": "UnitPriceSpecification",
              "billingDuration": "P1M"
            }
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What ages is ReadNest built for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ReadNest is built for kindergarten, first grade, and second grade learners who are practicing early reading, sight words, phonics, sentence fluency, and memory skills."
            }
          },
          {
            "@type": "Question",
            "name": "Can kids try ReadNest for free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Guests can try starter Reading and Memory activities, and signed-in free student accounts can also use Rhymes, Sounds, and Sentences."
            }
          },
          {
            "@type": "Question",
            "name": "What does Family Plus unlock?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Family Plus unlocks the premium personalized student path, including Story Steps, Word Garden, cloud progress support, printable plans, and future premium content packs."
            }
          },
          {
            "@type": "Question",
            "name": "What does Teacher Pro include?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Teacher Pro includes classroom dashboard access, assigned-student progress analysis, report exports, intervention planning, and AI-supported recommendation workflows when enabled."
            }
          },
          {
            "@type": "Question",
            "name": "Is ReadNest a diagnostic tool?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. ReadNest is educational practice support and is not a medical, clinical, or diagnostic service."
            }
          }
        ]
      }
    </script>

    <title>ReadNest | Personalized Reading Practice and Teacher Insights for Kids</title>
  </head>
  <body>
    <noscript>
      <main>
        <h1>ReadNest Personalized Reading App</h1>
        <p>
          ReadNest is an educational reading app for kindergarten, first grade, and second grade children.
          It helps young learners follow a personalized path for sight words, phonics blending, sentence
          fluency, memory skills, and confidence-building practice.
        </p>
        <p>
          The app also supports caregiver progress summaries and a teacher dashboard for student reading
          strengths, growth areas, classroom literacy insights, and intervention planning.
        </p>
      </main>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
